name: Minimal context-budget cleanup

on:
  push:
    branches:
      - fix/context-budget-root
  pull_request:
    branches:
      - dev

permissions:
  contents: write

jobs:
  verify:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Revert formatting churn and apply semantic cleanup
        run: |
          git revert --no-commit 138a6ff0ef4ebb994a5b2f02231ce5bb44351294
          python .github/minimal-context-cleanup.py

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit and integration tests
        working-directory: packages/opencode
        run: |
          bun test --timeout 30000 \
            test/session/context-budget.test.ts \
            test/session/overflow.test.ts \
            test/session/prune.test.ts \
            test/session/prompt-rebuild-reset.test.ts \
            test/session/rebuild-budget.test.ts \
            test/session/status-context.test.ts \
            test/cli/tui/context-usage.test.ts \
            test/session/checkpoint-rebuild-unify.test.ts \
            test/session/prompt-effect.test.ts

      - name: Typecheck
        working-directory: packages/opencode
        run: bun typecheck

      - name: Lint
        run: bun run lint

      - name: Review minimal diff
        run: |
          git diff --check
          git status --short
          git diff --stat 0ac6c7f464b509605d404a112fe676f101ed86be
          git diff 0ac6c7f464b509605d404a112fe676f101ed86be -- \
            packages/opencode/src/session/overflow.ts \
            packages/opencode/src/session/prune.ts \
            packages/opencode/src/session/prompt.ts \
            packages/opencode/src/session/checkpoint.ts

      - name: Commit minimal verified diff
        run: |
          git add packages/opencode
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          HUSKY=0 git commit --no-verify -m "fix(session): minimize context budget diff"
          git push origin HEAD:fix/context-budget-root

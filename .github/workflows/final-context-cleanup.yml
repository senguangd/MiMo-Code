name: Final context-budget cleanup

on:
  push:
    branches:
      - fix/context-budget-root
  pull_request:
    branches:
      - dev

permissions:
  contents: write

jobs:
  verify:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Apply cleanup
        run: python .github/final-context-cleanup.py

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format changed files
        run: |
          bunx prettier --write \
            packages/opencode/src/cli/cmd/tui/component/prompt/index.tsx \
            packages/opencode/src/cli/cmd/tui/feature-plugins/sidebar/context.tsx \
            packages/opencode/src/cli/cmd/tui/util/context-usage.ts \
            packages/opencode/src/config/config.ts \
            packages/opencode/src/session/checkpoint.ts \
            packages/opencode/src/session/llm.ts \
            packages/opencode/src/session/overflow.ts \
            packages/opencode/src/session/prompt.ts \
            packages/opencode/src/session/prune.ts \
            packages/opencode/src/session/status.ts \
            packages/opencode/test/cli/tui/context-usage.test.ts \
            packages/opencode/test/session/context-budget.test.ts \
            packages/opencode/test/session/overflow.test.ts \
            packages/opencode/test/session/prompt-rebuild-reset.test.ts \
            packages/opencode/test/session/prune.test.ts \
            packages/opencode/test/session/rebuild-budget.test.ts \
            packages/opencode/test/session/status-context.test.ts

      - name: Unit and integration tests
        working-directory: packages/opencode
        run: |
          bun test --timeout 30000 \
            test/session/context-budget.test.ts \
            test/session/overflow.test.ts \
            test/session/prune.test.ts \
            test/session/prompt-rebuild-reset.test.ts \
            test/session/rebuild-budget.test.ts \
            test/session/status-context.test.ts \
            test/cli/tui/context-usage.test.ts \
            test/session/checkpoint-rebuild-unify.test.ts \
            test/session/prompt-effect.test.ts

      - name: Typecheck
        id: types
        continue-on-error: true
        working-directory: packages/opencode
        run: bun typecheck > ../../final-context-typecheck.log 2>&1

      - name: Capture typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-context-typecheck
          path: final-context-typecheck.log

      - name: Stop after typecheck failure
        if: steps.types.outcome != 'success'
        run: |
          cat final-context-typecheck.log
          exit 1

      - name: Lint
        run: bun run lint

      - name: Review diff
        run: |
          git diff --check
          git status --short
          git diff --stat
          git diff -- packages/opencode/src/session/overflow.ts packages/opencode/src/session/prune.ts packages/opencode/src/session/prompt.ts packages/opencode/src/session/checkpoint.ts

      - name: Commit verified cleanup
        run: |
          rm final-context-typecheck.log
          git add packages/opencode
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(session): polish context budget invariants"
          git push origin HEAD:fix/context-budget-root

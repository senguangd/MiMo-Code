name: Context budget root fix

on:
  push:
    branches:
      - fix/context-budget-root
  pull_request:
    branches:
      - dev

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event_name == 'push' || github.event.pull_request.head.ref == 'fix/context-budget-root'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Apply root fix
        id: apply
        continue-on-error: true
        run: python .github/context-fix.py > context-fix.log 2>&1

      - name: Capture generator log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: context-fix-log
          path: context-fix.log

      - name: Stop after generator failure
        if: steps.apply.outcome != 'success'
        run: |
          cat context-fix.log
          exit 1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit and integration tests
        working-directory: packages/opencode
        run: |
          bun test --timeout 30000 \
            test/session/context-budget.test.ts \
            test/session/overflow.test.ts \
            test/session/prune.test.ts \
            test/session/prompt-rebuild-reset.test.ts \
            test/session/rebuild-budget.test.ts \
            test/session/status-context.test.ts \
            test/cli/tui/context-usage.test.ts \
            test/session/checkpoint-rebuild-unify.test.ts \
            test/session/prompt-effect.test.ts

      - name: Typecheck
        working-directory: packages/opencode
        run: bun typecheck

      - name: Review generated diff
        run: |
          git diff --check
          git status --short
          git diff --stat
          git diff -- packages/opencode/src/session/overflow.ts packages/opencode/src/session/prune.ts packages/opencode/src/session/prompt.ts

      - name: Commit verified implementation
        run: |
          rm .github/context-fix.py .github/workflows/context-budget-fix.yml context-fix.log
          git add -A
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(session): decouple checkpointing from context reduction"
          git push origin HEAD:fix/context-budget-root

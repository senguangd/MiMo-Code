name: Verify token-counter E2E tests

on:
  push:
    branches:
      - fix/context-budget-root
  pull_request:
    branches:
      - dev

permissions:
  contents: write

jobs:
  verify:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Apply test fixture update
        run: python .github/fix-llm-token-counter-tests.py

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Fake-provider E2E and context integration tests
        working-directory: packages/opencode
        run: |
          bun test --timeout 30000 \
            test/session/llm.test.ts \
            test/session/context-budget.test.ts \
            test/session/overflow.test.ts \
            test/session/prune.test.ts \
            test/session/prompt-rebuild-reset.test.ts \
            test/session/rebuild-budget.test.ts \
            test/session/status-context.test.ts \
            test/cli/tui/context-usage.test.ts \
            test/session/checkpoint-rebuild-unify.test.ts \
            test/session/prompt-effect.test.ts

      - name: Typecheck
        working-directory: packages/opencode
        run: bun typecheck

      - name: Lint
        run: bun run lint

      - name: Review diff
        run: |
          git diff --check
          git status --short
          git diff --stat 0ac6c7f464b509605d404a112fe676f101ed86be
          git diff -- packages/opencode/test/session/llm.test.ts

      - name: Commit verified test update
        run: |
          git add packages/opencode/test/session/llm.test.ts
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          HUSKY=0 git commit --no-verify -m "test(session): cover token counter before chat streaming"
          git push origin HEAD:fix/context-budget-root
